services:
  front:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: /api
    ports:
      - "127.0.0.1:${FRONTEND_PORT:-8087}:80"
    depends_on:
      - back
    restart: unless-stopped

  back:
    build: ./backend/BudgetTracker.Api
    ports:
      - "127.0.0.1:${BACKEND_PORT:-5007}:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Host=db;Port=5432;Database=${POSTGRES_DB:-budget_tracker};Username=${POSTGRES_USER:-budgettracker};Password=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      Jwt__Key: ${JWT_KEY:?JWT_KEY is required}
      Jwt__Issuer: ${JWT_ISSUER:-BudgetTracker.Api}
      Jwt__Audience: ${JWT_AUDIENCE:-BudgetTracker.Frontend}
      Jwt__ExpiresInMinutes: 120
      Cors__AllowedOrigins__0: ${CORS_ORIGIN:-http://localhost:8087}
      Database__AutoMigrate: ${DATABASE_AUTO_MIGRATE:-true}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-budget_tracker}
      POSTGRES_USER: ${POSTGRES_USER:-budgettracker}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-budgettracker} -d ${POSTGRES_DB:-budget_tracker}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
